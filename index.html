<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航1024</title>
    <link rel="icon" type="image/png" href="image/logo.png">
    <link rel="apple-touch-icon" href="image/logo.png">
    <link rel="stylesheet" href="css/style.css?v=2.3">
    <link rel="stylesheet" href="css/m.css?v=2.3">
    <script type="module">
        import { shareUrl, exportData, importData, checkDeadLinks } from './js/utils.js';
        window.utils = { shareUrl, exportData, importData, checkDeadLinks };
    </script>
</head>
<body>
    <!-- 主体容器 -->
    <div class="app-container">
        <!-- 移动端顶部导航栏 -->
        <div class="mobile-nav">
            <a href="#" class="mobile-nav-logo" onclick="goHome(event)">
                <img src="image/logo.png" alt="Logo" id="mobileLogo">
                <span class="mobile-nav-title" id="mobileTitle">导航1024</span>
            </a>
            <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleDrawer()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        
        <!-- 左侧分类抽屉菜单 -->
        <div class="category-drawer" id="categoryDrawer">
            <div class="drawer-header">
                <h3>🧭 网站分类</h3>
                <p>快速访问常用分类</p>
            </div>
            <div class="drawer-categories" id="drawerCategories">
                <!-- JS 生成 -->
            </div>
        </div>
        
        <!-- 抽屉遮罩层 -->
        <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
        
        <!-- 侧边栏 -->
        <nav class="sidebar">
            <h2 onclick="goHome(event)">🧭 导航站</h2>
            <ul class="category-list" id="categoryList">
                <!-- JS 生成 -->
            </ul>
            
            <!-- 最近访问 -->
            <div class="recent-visits" id="recentVisits" style="display: none;">
                <h3 style="padding: 15px 20px 10px; font-size: 0.85rem; color: rgba(255,255,255,0.6); border-top: 1px solid rgba(255,255,255,0.1); margin-top: 10px;">最近访问</h3>
                <ul class="recent-list" id="recentList"></ul>
            </div>
        </nav>

        <!-- 主内容区域 -->
        <div class="content-wrapper">
            <main class="main-content">
                <!-- Banner 区域 -->
                <div class="banner" id="banner">
                    <div class="banner-content">
                        <h1 class="banner-title" id="bannerTitle"></h1>
                        <p class="banner-subtitle" id="bannerSubtitle"></p>
                    </div>
                    
                    <!-- 时间显示 -->
                    <div class="banner-time" id="bannerTime">
                        <div class="time-clock" id="timeClock"></div>
                        <div class="time-date" id="timeDate"></div>
                    </div>
                </div>
                
                <!-- 搜索框区域 -->
                <div class="search-container">
                    <!-- 搜索输入区域 -->
                    <div class="search-input-wrapper">
                        <select class="search-select" id="searchEngine">
                            <option value="bing">必应</option>
                            <option value="baidu">百度</option>
                            <option value="google">谷歌</option>
                            <option value="sogou">搜狗</option>
                            <option value="bilibili">B站</option>
                            <option value="weibo">微博</option>
                            <option value="zhihu">知乎</option>
                            <option value="github">GitHub</option>
                        </select>
                        <div class="search-input-box">
                            <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索... (支持标题和描述)" autocomplete="off">
                            <button class="search-clear-btn" id="searchClearBtn" title="清空搜索" style="display: none;">×</button>
                            <button class="theme-toggle-inline" id="themeToggle" title="切换主题">🌙</button>
                        </div>
                        <div class="search-buttons-mobile">
                            <button class="search-btn-mobile" id="mobileSearchBtn" title="搜索">🔍</button>
                            <button class="netdisk-btn-mobile" id="mobileNetdiskBtn" title="网盘搜索">☁️</button>
                        </div>
                        <button class="search-btn" id="desktopSearchBtn" onclick="handleDesktopSearchClick()" title="站内搜索（有结果时再次点击使用外部搜索引擎）">搜索</button>
                        <button class="netdisk-search-btn" id="desktopNetdiskBtn" onclick="handleDesktopNetdiskClick()" title="网盘资源搜索（新标签页打开）">
                            <span class="btn-text">网盘搜索</span>
                            <span class="btn-badge">HOT</span>
                        </button>
                    </div>
                </div>
                
                <!-- 分类标签 -->
                <div class="category-tabs" id="categoryTabs">
                    <!-- JS 生成 -->
                </div>

                <!-- 卡片区域 -->
                <div class="mobile-card-grid" id="cardGrid" 
                     ondragover="handleGridDragOver(event)" 
                     ondrop="handleGridDrop(event)">
                    <!-- JS 生成 -->
                </div>
            </main>

            <!-- 底部信息 -->
            <footer class="site-footer" id="siteFooter">
                <div class="friend-links" id="friendLinks"></div>
                <div class="copyright" id="copyrightText"></div>
            </footer>
        </div>
    </div>

    <!-- 编辑控制栏 -->
    <div class="edit-controls" id="globalEditControls">
        <div class="controls-title">⚙️ 编辑模式</div>
        <div class="btn-group">
            <button class="action-btn btn-add" onclick="showAddForm()">➕ 增加新网址</button>
            <button class="action-btn btn-netdisk-config" onclick="showNetdiskConfig()">🔍 网盘搜索设置</button>
            <button class="action-btn btn-check-links" onclick="checkDeadLinks()">🔍 检查死链</button>
            <button class="action-btn btn-refresh-icons" onclick="refreshFavicons()">🔄 刷新图标</button>
            <button class="action-btn btn-export" onclick="exportData()">📤 导出数据</button>
            <button class="action-btn btn-import" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
            <button class="action-btn btn-save" onclick="finishEdit()">💾 保存修改</button>
            <button class="action-btn btn-cancel" onclick="cancelEdit()">❌ 取消</button>
        </div>
    </div>

    <!-- 添加网址表单 -->
    <div class="add-form-overlay" id="addFormOverlay" onclick="hideAddForm(event)">
        <div class="add-form-container" onclick="event.stopPropagation()">
            <h3>添加新网址</h3>
            <div class="form-group">
                <label>网址：</label>
                <input type="text" class="form-input" id="addUrlInput" placeholder="输入网址后按回车，如：https://www.example.com" autocomplete="off">
                <div class="form-hint">按回车键自动获取网站信息</div>
            </div>
            <div id="addFormFields" style="display: none;">
                <div class="form-group">
                    <label>标题：</label>
                    <input type="text" class="form-input" id="addTitleInput" placeholder="网站标题">
                </div>
                <div class="form-group">
                    <label>描述：</label>
                    <textarea class="form-textarea" id="addDescInput" placeholder="网站描述"></textarea>
                </div>
                <div class="form-group">
                    <label>分类：</label>
                    <input type="text" class="form-input" id="addCategoryInput" placeholder="如：常用工具">
                </div>
                <div class="form-actions">
                    <button class="action-btn btn-confirm" onclick="confirmAdd()">确认添加</button>
                    <button class="action-btn btn-cancel-form" onclick="hideAddForm()">取消</button>
                </div>
            </div>
            <div id="addFormLoading" style="display: none; text-align: center; padding: 20px;">
                <div class="loading-spinner"></div>
                <div>正在获取网站信息...</div>
            </div>
        </div>
    </div>

    <!-- 网盘搜索配置表单 -->
    <div class="add-form-overlay" id="netdiskConfigOverlay" onclick="hideNetdiskConfig(event)">
        <div class="add-form-container" onclick="event.stopPropagation()">
            <h3>🔍 网盘搜索设置</h3>
            <div class="form-group">
                <label>网盘搜索地址：</label>
                <input type="text" class="form-input" id="netdiskSearchUrl" placeholder="例如：http://localhost:3000" autocomplete="off">
                <div class="form-hint">输入你的网盘搜索项目地址（不含参数）</div>
            </div>
            <div class="form-group">
                <label>参数名称：</label>
                <input type="text" class="form-input" id="netdiskSearchParam" placeholder="例如：q 或 keyword" value="q">
                <div class="form-hint">默认为 q，根据实际项目调整</div>
            </div>
            <div class="form-actions">
                <button class="action-btn btn-confirm" onclick="saveNetdiskConfig()">💾 保存设置</button>
                <button class="action-btn btn-cancel-form" onclick="hideNetdiskConfig()">取消</button>
            </div>
        </div>
    </div>

    <!-- 移动端悬浮按钮 -->
    <div class="mobile-float-btns">
        <button class="float-btn float-theme" id="mobileThemeToggle" title="切换主题">🌙</button>
        <button class="float-btn float-top" onclick="scrollToTop()" title="返回顶部">↑</button>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast">提示消息</div>

    <!-- 快捷键提示 -->
    <div class="shortcut-hint" id="shortcutHint">
        <kbd>/</kbd> 搜索 &nbsp;|&nbsp; <kbd>Ctrl+Enter</kbd> 网盘搜索
        <button class="scroll-top-btn" onclick="scrollToTop()" title="返回顶部">↑</button>
    </div>

    <script>
        // --- 全局变量 ---
        let navData = [];
        let currentCategory = '全部';
        let currentSubcategory = 'all'; // 当前选中的子分类（'all' 表示显示所有一级分类下的网址）
        let isEditMode = false;
        let nextId = 1;
        
        // --- 配置（从后端API获取）---
        let EDIT_TRIGGER = 'edit2024'; // 默认值，会被API覆盖
        let SITE_TITLE = '导航1024';
        let SITE_LOGO = 'image/logo.png';
        let COPYRIGHT_TEXT = '© 2024 导航1024. All rights reserved.';
        let FRIEND_LINKS = [];
        let BANNER_IMAGE = '';
        let BANNER_TITLE = '欢迎使用个人导航站';
        let BANNER_SUBTITLE = '快速访问您常用的网站';
        let SHOW_RECENT_VISITS = true; // 是否显示最近访问
        
        // 网盘搜索配置
        let NETDISK_SEARCH_URL = localStorage.getItem('netdiskSearchUrl') || 'http://localhost:3000';
        let NETDISK_SEARCH_PARAM = localStorage.getItem('netdiskSearchParam') || 'q';
        
        // Favicon 缓存
        const faviconCache = new Map(); 
        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        
        // 最近访问
        let recentVisits = JSON.parse(localStorage.getItem('recentVisits') || '[]');
        let drawerExpandedParents = new Set();

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            
            // 格式化时间 HH:MM:SS
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${hours}:${minutes}:${seconds}`;
            
            // 格式化日期 YYYY年MM月DD日 星期X
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            const dateStr = `${year}年${month}月${day}日 ${weekDay}`;
            
            // 更新显示
            const clockEl = document.getElementById('timeClock');
            const dateEl = document.getElementById('timeDate');
            if (clockEl) clockEl.textContent = timeStr;
            if (dateEl) dateEl.textContent = dateStr;
        }

        // --- 渲染图标（优先使用缓存，避免闪烁） ---
        function renderIcon(item, isRecent = false) {
            const faviconUrl = getFavicon(item.url);
            const firstLetter = (item.title || '?')[0].toUpperCase();
            const fontSize = isRecent ? '14px' : '18px';
            const fontColor = isRecent ? '#4a90e2' : 'var(--primary-color)';
            const padding = isRecent ? 'padding: 5px;' : '';
            
            if (!faviconUrl) {
                // 无 favicon，直接显示文字
                return `<span class="icon-fallback" style="width: 100%; height: 100%; align-items: center; justify-content: center; font-size: ${fontSize}; font-weight: bold; color: ${fontColor}; display: flex; ${padding}">${firstLetter}</span>`;
            }
            
            // 检查是否已缓存
            let isCached = false;
            try {
                const url = new URL(faviconUrl);
                if (url.hostname === 'icon.horse') {
                    const domain = url.pathname.replace('/icon/', '');
                    isCached = faviconCache.has(domain);
                }
            } catch(e) {}
            
            // 统一使用 icon-wrapper 包裹
            if (isCached) {
                // 已缓存：图片 + 隐藏的文字 fallback（图片加载失败时显示）
                return `<div class="icon-wrapper" style="position: relative; width: 100%; height: 100%;">
                            <img src="${faviconUrl}" 
                                alt="${item.title}" 
                                loading="eager"
                                class="icon-img cached"
                                style="width: 100%; height: 100%; object-fit: contain; ${padding} position: relative; z-index: 2;"
                                onerror="this.style.display='none'; this.parentElement.querySelector('.icon-fallback').style.display='flex';">
                            <span class="icon-fallback" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; align-items: center; justify-content: center; font-size: ${fontSize}; font-weight: bold; color: ${fontColor}; z-index: 1; ${padding}">${firstLetter}</span>
                        </div>`;
            } else {
                // 未缓存：先显示文字，图片加载成功后替换
                return `<div class="icon-wrapper" style="position: relative; width: 100%; height: 100%;">
                            <span class="icon-fallback" style="width: 100%; height: 100%; align-items: center; justify-content: center; font-size: ${fontSize}; font-weight: bold; color: ${fontColor}; display: flex; position: absolute; top: 0; left: 0; z-index: 1; ${padding}">${firstLetter}</span>
                            <img src="${faviconUrl}" 
                                alt="${item.title}" 
                                class="icon-img loading"
                                style="width: 100%; height: 100%; object-fit: contain; opacity: 0; position: absolute; top: 0; left: 0; z-index: 2; transition: opacity 0.15s ease; ${padding}"
                                onload="this.style.opacity='1'; this.parentElement.querySelector('.icon-fallback').style.display='none';" 
                                onerror="this.style.display='none'; this.parentElement.querySelector('.icon-fallback').style.display='flex';">
                        </div>`;
            }
        }
        
        // 获取网站 favicon
        function getFavicon(url) {
            try {
                const domain = new URL(url).hostname;
                
                // 检查缓存
                if (faviconCache.has(domain)) {
                    return faviconCache.get(domain);
                }
                
                // 使用多个备用API
                const faviconUrl = `https://icon.horse/icon/${domain}`;
                
                // 存入缓存
                faviconCache.set(domain, faviconUrl);
                
                return faviconUrl;
            } catch (error) {
                console.warn('获取 favicon 失败:', error);
                return null;
            }
        }

        // --- 名人名言功能 ---
        let quotes = [];
        
        async function loadQuote() {
            try {
                // 加载名人名言 JSON 文件
                const response = await fetch('data/名人名言.json');
                if (!response.ok) throw new Error('无法加载名人名言');
                
                quotes = await response.json();
                
                // 随机显示一条名言到 placeholder
                showRandomQuote();
                
                // 每 30 秒自动切换一次
                setInterval(showRandomQuote, 30000);
            } catch (error) {
                // 如果加载失败，使用默认 placeholder
                document.getElementById('searchInput').placeholder = '输入关键词搜索... (支持标题和描述)';
            }
        }
        
        function showRandomQuote() {
            if (quotes.length === 0) return;
                    
            const searchInput = document.getElementById('searchInput');
                    
            // 随机选择一条名言
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const quote = quotes[randomIndex];
                    
            // 更新 placeholder,格式:"名言"   -   名人(-前后各3个空格)
            searchInput.placeholder = `"${quote.quote}"   -   ${quote.author}`;
        }

        // --- 初始化 ---
        async function init() {
            try {
                // 加载配置
                await loadConfig();
                
                // 初始化主题
                applyTheme();
                
                // 启动时钟
                updateTime();
                setInterval(updateTime, 1000);
                
                // 加载必应壁纸
                loadBingWallpaper();
                
                // 加载名人名言
                loadQuote();
                
                // 加载导航数据
                const response = await fetch('data/data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('网络错误');
                navData = await response.json();
                
                // 验证数据格式
                if (!Array.isArray(navData)) {
                    navData = []; // 重置为空数组
                    showToast('⚠️ 数据格式错误，已重置');
                }
                
                // 计算下一个ID
                if (navData.length > 0) {
                    nextId = Math.max(...navData.map(item => item.id)) + 1;
                }
                
                // 渲染移动端组件
                renderDrawerCategories();
                renderCategoryTabs();
                applyMobileConfig();
                
                renderSidebar();
                renderCards();
                renderRecentVisits();
                initSwipeGesture();
                
                // 确保搜索框可用
                const searchInput = document.getElementById('searchInput');
                if (searchInput) {
                    searchInput.disabled = false;
                    searchInput.readOnly = false;
                }
            } catch (error) {
                showToast('无法加载数据，请检查 data.json');
            }
        }

        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch('api/config.php');
                if (response.ok) {
                    const result = await response.json();
                    if (result.status === 'success' && result.config) {
                        EDIT_TRIGGER = result.config.edit_trigger;
                        SITE_TITLE = result.config.site_title;
                        SITE_LOGO = result.config.site_logo;
                        COPYRIGHT_TEXT = result.config.copyright;
                        FRIEND_LINKS = result.config.friend_links || [];
                        BANNER_IMAGE = result.config.banner_image || '';
                        BANNER_TITLE = result.config.banner_title || '欢迎使用个人导航站';
                        BANNER_SUBTITLE = result.config.banner_subtitle || '快速访问您常用的网站';
                        SHOW_RECENT_VISITS = result.config.show_recent_visits !== undefined ? result.config.show_recent_visits : true;
                        
                        // 应用配置到页面
                        document.title = SITE_TITLE;
                        applySiteConfig();
                    }
                }
            } catch (error) {
                // 配置加载失败，使用默认值
            }
        }

        // 应用网站配置到页面
        function applySiteConfig() {
            // 更新标题
            const titleElement = document.querySelector('.sidebar h2');
            if (titleElement) {
                if (SITE_LOGO) {
                    titleElement.innerHTML = `<img src="${SITE_LOGO}" alt="Logo" style="width: 32px; height: 32px; vertical-align: middle; margin-right: 8px;">${SITE_TITLE}`;
                } else {
                    titleElement.textContent = SITE_TITLE;
                }
            }
            
            // 应用移动端配置
            applyMobileConfig();
            
            // 渲染 Banner
            renderBanner();
            
            // 渲染底部信息
            renderFooter();
        }

        // 渲染 Banner
        function renderBanner() {
            const bannerDiv = document.getElementById('banner');
            const bannerTitle = document.getElementById('bannerTitle');
            const bannerSubtitle = document.getElementById('bannerSubtitle');
            
            if (BANNER_IMAGE) {
                // 有配置图片：使用配置的图片
                bannerDiv.style.backgroundImage = `url('${BANNER_IMAGE}')`;
                bannerDiv.classList.add('has-image');
                bannerDiv.style.color = 'white';
            } else {
                // 无配置：使用渐变背景（必应壁纸会通过loadBingWallpaper加载）
                bannerDiv.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                bannerDiv.classList.remove('has-image');
                bannerDiv.style.color = 'white';
            }
            
            bannerTitle.textContent = BANNER_TITLE;
            bannerSubtitle.textContent = BANNER_SUBTITLE;
        }

        // 渲染底部信息
        function renderFooter() {
            // 渲染友情链接
            const friendLinksDiv = document.getElementById('friendLinks');
            if (FRIEND_LINKS && FRIEND_LINKS.length > 0) {
                friendLinksDiv.innerHTML = `
                    <span class="friend-links-title">友情链接：</span>
                    <div class="friend-links-list">
                        ${FRIEND_LINKS.map(link => `
                            <a href="${link.url}" target="_blank" rel="noopener noreferrer">${link.name}</a>
                        `).join('')}
                    </div>
                `;
            } else {
                friendLinksDiv.innerHTML = '';
            }
            
            // 渲染版权信息
            const copyrightDiv = document.getElementById('copyrightText');
            copyrightDiv.textContent = COPYRIGHT_TEXT;
        }

        // --- 移动端抽屉菜单 ---
        function toggleDrawer() {
            const drawer = document.getElementById('categoryDrawer');
            const overlay = document.getElementById('drawerOverlay');
            const hamburger = document.getElementById('hamburgerBtn');
            
            drawer.classList.toggle('open');
            overlay.classList.toggle('show');
            hamburger.classList.toggle('active');
        }
        
        function closeDrawer() {
            const drawer = document.getElementById('categoryDrawer');
            const overlay = document.getElementById('drawerOverlay');
            const hamburger = document.getElementById('hamburgerBtn');
            
            drawer.classList.remove('open');
            overlay.classList.remove('show');
            hamburger.classList.remove('active');
        }
        
        // 渲染抽屉分类
        function renderDrawerCategories() {
            const drawer = document.getElementById('drawerCategories');
            const allCategories = ['全部', ...new Set(navData.map(item => item.category))];
            const tree = {};
            const parentOrder = [];

            function ensureParent(parent) {
                if (!tree[parent]) {
                    tree[parent] = { children: [] };
                    parentOrder.push(parent);
                }
            }

            allCategories.forEach(cat => {
                if (cat.includes('-')) {
                    const parts = cat.split('-');
                    const parent = parts[0].trim();
                    const child = parts.slice(1).join('-').trim();
                    ensureParent(parent);
                    tree[parent].children.push({ full: cat, name: child });
                } else {
                    ensureParent(cat);
                }
            });

            let html = '';
            parentOrder.forEach(parent => {
                const children = tree[parent].children;
                const hasChildren = children.length > 0;
                const parentCount = parent === '全部'
                    ? navData.length

        // --- 图标懒加载 ---
        function initLazyIcons() {
            if ('IntersectionObserver' in window) {
                const iconObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            const imgSrc = img.dataset.src;
                            
                            // 检查是否已缓存
                            let isCached = false;
                            try {
                                const url = new URL(imgSrc);
                                if (url.hostname === 'icon.horse') {
                                    const domain = url.pathname.replace('/icon/', '');
                                    isCached = faviconCache.has(domain);
                                }
                            } catch(e) {}
                            
                            if (isCached) {
                                // 已缓存的图标：立即显示，无需淡入
                                img.src = imgSrc;
                                img.classList.remove('lazy-icon');
                            } else {
                                // 未缓存的图标：淡入效果
                                img.style.opacity = '0';
                                img.style.transition = 'opacity 0.15s ease';
                                img.onload = function() {
                                    img.style.opacity = '1';
                                };
                                img.src = imgSrc;
                                img.classList.remove('lazy-icon');
                            }
                            
                            observer.unobserve(img);
                        }
                    });
                }, {
                    rootMargin: '200px' // 提前200px开始加载
                });

                document.querySelectorAll('.lazy-icon').forEach(img => {
                    iconObserver.observe(img);
                });
            } else {
                // 回退方案
                document.querySelectorAll('.lazy-icon').forEach(img => {
                    img.src = img.dataset.src;
                });
            }
        }

        // --- 交互逻辑 ---
        function switchCategory(cat) {
            // 保存编辑框中的内容再切换分类
            if (isEditMode) saveInputChanges();
            currentCategory = cat;
            currentSubcategory = 'all'; // 切换一级分类时，默认显示全部
            hasLocalResults = false; // 重置搜索结果标记
            renderSidebar();
            renderCards();
            renderDrawerCategories();
            renderCategoryTabs();
        }
        
        // --- 切换子分类 ---
        function switchSubcategory(subcat) {
            currentSubcategory = subcat;
            
            // 如果切换到二级分类，更新 currentCategory
            if (subcat !== 'all' && subcat.includes('-')) {
                currentCategory = subcat;
            } else if (subcat === 'all') {
                // 如果切换到“全部”，保持当前一级分类
                if (currentCategory.includes('-')) {
                    currentCategory = currentCategory.split('-')[0].trim();
                }
            }
            
            // 获取当前的卡片容器
            const cardRow = document.querySelector('.card-row');
            if (!cardRow) {
                // 如果没有卡片容器，重新渲染整个页面
                renderCards();
                setTimeout(initUnderlinePositions, 100);
                return;
            }
            
            // 只更新卡片内容，不重新创建标签页
            let dataToShow;
            if (subcat === 'all') {
                // 显示所有一级和二级分类
                const parentCat = currentCategory.includes('-') ? currentCategory.split('-')[0].trim() : currentCategory;
                const parentData = navData.filter(item => item.category === parentCat);
                const allCategories = [...new Set(navData.map(item => item.category))];
                const subcategories = allCategories.filter(cat => {
                    if (!cat.includes('-')) return false;
                    const pCat = cat.split('-')[0].trim();
                    return pCat === parentCat;
                });
                
                dataToShow = [...parentData];
                subcategories.forEach(sc => {
                    dataToShow = dataToShow.concat(navData.filter(item => item.category === sc));
                });
            } else {
                // 只显示指定二级分类
                dataToShow = navData.filter(item => item.category === subcat);
            }
            
            // 更新卡片内容
            if (dataToShow.length > 0) {
                cardRow.innerHTML = dataToShow.map((item, index) => renderSingleCard(item, index)).join('');
            } else {
                cardRow.innerHTML = '<div style="text-align:center; color:#999; width:100%; padding:50px;">暂无数据</div>';
            }
            
            initLazyIcons();
            
            // 更新标签激活状态
            document.querySelectorAll('.subcategory-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 找到对应的标签并激活
            const tabs = document.querySelectorAll('.subcategory-tab');
            tabs.forEach(tab => {
                const onclickAttr = tab.getAttribute('onclick');
                if (onclickAttr && onclickAttr.includes(`'${subcat}'`)) {
                    tab.classList.add('active');
                }
            });
            
            // 更新下划线位置（延迟确保DOM更新完成）
            setTimeout(() => {
                const activeTab = document.querySelector('.subcategory-tab.active');
                if (activeTab) {
                    updateUnderlinePosition(activeTab);
                }
            }, 50);
        }
        
        // --- "全部"模式下的标签页切换 ---
        function switchAllTab(button, parentCat, subcat) {

            const tabsContainer = button.parentElement;
            tabsContainer.querySelectorAll('.subcategory-tab').forEach(tab => {
                tab.classList.remove('active');

            // 更新滑动下划线位置
            updateUnderlinePosition(button);
            
            // 获取该一级分类下的所有二级分类
            const allCategories = [...new Set(navData.map(item => item.category))];
            const subcategories = allCategories.filter(cat => {
                if (!cat.includes('-')) return false;
                const parent = cat.split('-')[0].trim();
                return parent === parentCat;
            });
            
            // 根据选中的标签显示对应网址
            const cardRow = document.getElementById(`all-cards-${parentCat}`);
            if (!cardRow) return;
            
            let dataToShow = [];
            
            if (subcat === 'all') {
                // 显示所有一级分类和二级分类的网址
                const parentData = navData.filter(item => item.category === parentCat);
                dataToShow = [...parentData];
                subcategories.forEach(sc => {
                    dataToShow = dataToShow.concat(navData.filter(item => item.category === sc));

            } else {
                // 只显示指定二级分类的网址
                dataToShow = navData.filter(item => item.category === subcat);

            if (dataToShow.length > 0) {
                cardRow.innerHTML = dataToShow.map((item, index) => renderSingleCard(item, index)).join('');

        // --- 更新下划线位置 ---
        function updateUnderlinePosition(button) {
            const tabsContainer = button.parentElement;
            
            // 查找或创建下划线指示器
            let indicator = tabsContainer.querySelector('.underline-indicator');
            if (!indicator) {
                indicator = document.createElement('div');
                indicator.className = 'underline-indicator';
                tabsContainer.appendChild(indicator);
            }
            
            // 使用 getBoundingClientRect 计算精确位置
            const buttonRect = button.getBoundingClientRect();
            const containerRect = tabsContainer.getBoundingClientRect();
            
            // 计算相对于容器的位置（考虑 padding）
            const targetLeft = buttonRect.left - containerRect.left;
            const targetWidth = buttonRect.width;
            
            // 使用 requestAnimationFrame 确保流畅
            requestAnimationFrame(() => {
                indicator.style.transform = `translateX(${targetLeft}px)`;
                indicator.style.width = `${targetWidth}px`;
            });
        }

        /**
         * 放下分类，执行排序
         * @param {Event} e - 拖拽事件
         * @param {string} targetCategory - 目标分类名称
         */
        function handleCategoryDrop(e, targetCategory) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!draggedCategory || draggedCategory === targetCategory) return;
            
            // 获取所有分类（保持当前顺序）
            const allCategories = ['全部', ...new Set(navData.map(item => item.category))];
            
            const draggedIndex = allCategories.indexOf(draggedCategory);
            const targetIndex = allCategories.indexOf(targetCategory);
            
            if (draggedIndex === -1 || targetIndex === -1) return;
            
            // 移除被拖动的分类
            const [removedCategory] = allCategories.splice(draggedIndex, 1);
            
            // 计算新的插入位置
            let insertIndex = targetIndex;
            if (draggedIndex < targetIndex) {
                // 从前往后拖，插入位置需要减1（因为已经移除了一个元素）
                insertIndex = targetIndex - 1;
            }
            
            // 插入到新位置
            allCategories.splice(insertIndex, 0, removedCategory);
            
            // 根据新的分类顺序重新排列 navData
            const reorderedData = [];
            allCategories.forEach(cat => {
                if (cat === '全部') return; // 跳过"全部"
                const items = navData.filter(item => item.category === cat);
                reorderedData.push(...items);
            });
            
            navData = reorderedData;
            
            showToast('已调整分类顺序（需点击保存才生效）');
            renderSidebar();
            renderCards();

        /**
         * 开始拖拽二级分类
         * @param {Event} e - 拖拽事件
         * @param {string} subcategoryName - 被拖拽的二级分类名称
         * @param {string} parentCat - 父分类名称
         */
        function handleSubcategoryDragStart(e, subcategoryName, parentCat) {
            // 在开始拖动前保存所有编辑框中的内容
            if (isEditMode) saveInputChanges();
            
            e.stopPropagation();
            draggedSubcategory = subcategoryName;

        /**

         * @param {Event} e - 拖拽事件
         */

        /**
         * 放下二级分类，执行排序
         * @param {Event} e - 拖拽事件
         * @param {string} targetSubcategory - 目标二级分类名称
         * @param {string} parentCat - 父分类名称
         */
        function handleSubcategoryDrop(e, targetSubcategory, parentCat) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!draggedSubcategory || draggedSubcategory === targetSubcategory) return;
            if (draggedSubcategoryParent !== parentCat) {
                showToast('只能在同一父分类下排序');
                return;
            }
            
            // 获取该父分类下的所有二级分类（保持当前顺序）
            const allCategories = ['全部', ...new Set(navData.map(item => item.category))];
            const subcategories = allCategories.filter(cat => {
                if (!cat.includes('-')) return false;
                const parts = cat.split('-');
                const parent = parts[0].trim();
                return parent === parentCat;
            });
            
            const draggedIndex = subcategories.indexOf(draggedSubcategory);
            const targetIndex = subcategories.indexOf(targetSubcategory);
            
            if (draggedIndex === -1 || targetIndex === -1) return;
            
            // 移除被拖动的二级分类
            const [removedSubcategory] = subcategories.splice(draggedIndex, 1);
            
            // 计算新的插入位置
            let insertIndex = targetIndex;
            if (draggedIndex < targetIndex) {
                // 从前往后拖，插入位置需要减1（因为已经移除了一个元素）
                insertIndex = targetIndex - 1;
            }
            
            // 插入到新位置
            subcategories.splice(insertIndex, 0, removedSubcategory);
            
            // 根据新的二级分类顺序重新排列 navData
            const reorderedData = [];
            
            // 先添加不属于该父分类的项目
            navData.forEach(item => {
                if (!item.category.includes('-')) {
                    reorderedData.push(item);
                } else {
                    const parts = item.category.split('-');
                    const parent = parts[0].trim();
                    if (parent !== parentCat) {
                        reorderedData.push(item);
                    }
                }
            });
            
            // 再按新顺序添加该父分类下的项目
            const tempData = [...reorderedData];
            reorderedData.length = 0;
            
            // 先添加非该父分类的项目
            tempData.forEach(item => {
                if (!item.category.includes('-')) {
                    reorderedData.push(item);
                } else {
                    const parts = item.category.split('-');
                    const parent = parts[0].trim();
                    if (parent !== parentCat) {
                        reorderedData.push(item);
                    }
                }
            });
            
            // 按新顺序添加该父分类下的项目
            subcategories.forEach(subcat => {
                const items = navData.filter(item => item.category === subcat);
                reorderedData.push(...items);
            });
            
            // 添加该父分类本身的项目（如果有）
            const parentItems = navData.filter(item => item.category === parentCat);
            if (parentItems.length > 0) {
                // 将父分类项目插入到第一个子分类之前
                const firstSubcatIndex = reorderedData.findIndex(item => {
                    if (!item.category.includes('-')) return false;
                    const parts = item.category.split('-');
                    return parts[0].trim() === parentCat;
                });
                if (firstSubcatIndex !== -1) {
                    reorderedData.splice(firstSubcatIndex, 0, ...parentItems);
                } else {
                    reorderedData.push(...parentItems);
                }
            }
            
            navData = reorderedData;
            
            showToast('已调整二级分类顺序（需点击保存才生效）');
            renderSidebar();
            renderCards();
        }

            e.target.style.opacity = '1';
            e.target.classList.remove('dragging');
            draggedSubcategory = null;
            draggedSubcategoryParent = null;
        }

        function handleDragStart(e) {

                let insertIndex = targetRealIndex;

                    // 从前往后拖，插入位置需要减1（因为已经移除了一个元素）
                    insertIndex = targetRealIndex - 1;

                // 插入到新位置

        // --- 保存逻辑 ---
        function finishEdit() {
            // 1. 收集数据
            const inputs = document.querySelectorAll('.edit-input');
            inputs.forEach(input => {
                const id = parseInt(input.getAttribute('data-id'));
                const key = input.getAttribute('data-key');
                const value = input.value;
                const item = navData.find(i => i.id === id);
                if (item) item[key] = value;
            });

            // 清理数据中的无效字符
            const cleanData = navData.map(item => {
                const cleaned = {};
                for (let key in item) {
                    if (typeof item[key] === 'string') {
                        // 使用 encodeURIComponent/decodeURIComponent 清理无效字符
                        try {
                            cleaned[key] = decodeURIComponent(encodeURIComponent(item[key]));
                        } catch (e) {
                            // 如果失败,移除所有非ASCII和非中文的字符
                            cleaned[key] = item[key].replace(/[^\x20-\x7E\u4e00-\u9fa5]/g, '');
                        }
                    } else {
                        cleaned[key] = item[key];
                    }
                }
                return cleaned;
            });

            // 2. 发送请求
            fetch('api/edit.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: cleanData })
            })
            .then(response => response.json())
            .then(res => {
                if (res.status === 'success') {
                    showToast('保存成功！');
                    isEditMode = false;
                    document.getElementById('globalEditControls').classList.remove('active');
                    renderCards();
                    renderSidebar();
                } else {
                    alert('保存失败：' + res.message);
                }
            })
            .catch(error => {
                alert('网络错误：' + error);
            });
        }

        // 网盘搜索功能
        function doNetdiskSearch(openInNewTab = false) {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                showToast('请输入搜索关键词');
                document.getElementById('searchInput').focus();
                return;
            }
            
            // 使用配置的网盘搜索地址和参数
            const baseUrl = NETDISK_SEARCH_URL.replace(/\/$/, ''); // 移除末尾斜杠
            const netdiskUrl = `${baseUrl}/?ai=${encodeURIComponent(keyword)}`;
            
            if (openInNewTab) {
                // 点击按钮：新标签页打开
                window.open(netdiskUrl, '_blank');
            } else {
                // Ctrl+Enter：当前页跳转（确保激活）

        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                const value = e.target.value;
                
                // 显示/隐藏清空按钮
                if (searchClearBtn) {
                    searchClearBtn.style.display = value ? 'block' : 'none';
                }
                
                if (value.trim() === EDIT_TRIGGER) {
                    e.target.value = '';
                    if (searchClearBtn) searchClearBtn.style.display = 'none';
                    toggleEditMode();

            });

                    searchInput.value = '';
                    this.style.display = 'none';
                    searchInput.focus();
                    hasLocalResults = false; // 重置搜索结果标记
                    if (currentCategory === '搜索结果') {
                        switchCategory('全部');
                    }
                });
            }

            // 监听回车搜索（使用 keydown 以支持 Ctrl 键检测）
            searchInput.addEventListener('keydown', function(e) {

                    e.preventDefault(); // 阻止默认行为

                    if (keyword !== EDIT_TRIGGER) {

                }

        async function fetchSiteInfo(url) {
            document.getElementById('addFormFields').style.display = 'none';
            document.getElementById('addFormLoading').style.display = 'block';
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            try {
                const response = await fetch('api/fetch_site_info.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    document.getElementById('addUrlInput').value = result.data.url;
                    document.getElementById('addTitleInput').value = result.data.title;
                    document.getElementById('addDescInput').value = result.data.desc;
                    
                    const defaultCategory = currentCategory === '全部' ? '常用工具' : currentCategory;
                    document.getElementById('addCategoryInput').value = defaultCategory;
                    
                    document.getElementById('addFormLoading').style.display = 'none';
                    document.getElementById('addFormFields').style.display = 'block';
                    
                    document.getElementById('addTitleInput').focus();
                } else {
                    showToast('获取失败：' + result.message);
                    document.getElementById('addFormLoading').style.display = 'none';
                    document.getElementById('addFormFields').style.display = 'block';
                    document.getElementById('addUrlInput').value = url;
                    document.getElementById('addTitleInput').value = '';
                    document.getElementById('addDescInput').value = '';
                    document.getElementById('addCategoryInput').value = currentCategory === '全部' ? '常用工具' : currentCategory;
                }
            } catch (error) {
                console.error('获取网站信息失败:', error);
                showToast('网络错误，请手动填写');
                document.getElementById('addFormLoading').style.display = 'none';
                document.getElementById('addFormFields').style.display = 'block';
                document.getElementById('addUrlInput').value = url;
                document.getElementById('addTitleInput').value = '';
                document.getElementById('addDescInput').value = '';
                document.getElementById('addCategoryInput').value = currentCategory === '全部' ? '常用工具' : currentCategory;
            }
        }

        function confirmAdd() {
            const url = document.getElementById('addUrlInput').value.trim();
            const title = document.getElementById('addTitleInput').value.trim();
            const desc = document.getElementById('addDescInput').value.trim();
            const category = document.getElementById('addCategoryInput').value.trim();
            
            if (!url || !title) {
                showToast('网址和标题不能为空');
                return;
            }
            
            let finalUrl = url;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }
            
            const newItem = {
                id: nextId++,
                category: category || '其他',
                title: title,
                url: finalUrl,
                desc: desc || '',
                icon: title[0]
            };
            
            navData.push(newItem);
            
            hideAddForm();
            
            // 在编辑模式下，添加新卡片前先保存其他卡片的编辑内容
            if (isEditMode) saveInputChanges();
            renderCards();
            renderSidebar();
            
            showToast('已添加新网址（需点击保存才生效）');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // --- 深色模式 ---
        function applyTheme() {
            document.body.classList.toggle('dark-mode', isDarkMode);
            const themeBtn = document.getElementById('themeToggle');
            const mobileThemeBtn = document.getElementById('mobileThemeToggle');
            const themeIcon = isDarkMode ? '☀️' : '🌙';
            if (themeBtn) themeBtn.textContent = themeIcon;
            if (mobileThemeBtn) mobileThemeBtn.textContent = themeIcon;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('themeToggle');
            const mobileThemeToggle = document.getElementById('mobileThemeToggle');
            
            const handleThemeToggle = function() {
                isDarkMode = !isDarkMode;
                localStorage.setItem('darkMode', isDarkMode);
                applyTheme();
            };

            if (themeToggle) themeToggle.addEventListener('click', handleThemeToggle);
            if (mobileThemeToggle) mobileThemeToggle.addEventListener('click', handleThemeToggle);
        });


        // --- 必应壁纸 ---
        async function loadBingWallpaper() {
            try {
                const today = new Date().toDateString();
                const cached = localStorage.getItem('bing_wallpaper');
                const cachedDate = localStorage.getItem('bing_wallpaper_date');
                
                if (cached && cachedDate === today) {
                    updateBannerImage(cached);
                    return;
                }
                
                const response = await fetch('api/bing_wallpaper.php');
                const data = await response.json();
                
                if (data.status === 'success') {
                    localStorage.setItem('bing_wallpaper', data.url);
                    localStorage.setItem('bing_wallpaper_date', today);
                    updateBannerImage(data.url);
                }
            } catch (error) {
                console.warn('壁纸加载失败:', error);
            }
        }

        function updateBannerImage(url) {
            const banner = document.getElementById('banner');
            if (banner && url) {
                banner.style.backgroundImage = `url('${url}')`;
                banner.classList.add('has-image');
            }
        }

// --- 死链检测 ---
        async function checkDeadLinks() {
            if (window.utils && window.utils.checkDeadLinks) {
                await window.utils.checkDeadLinks(navData, {
                    showToast: showToast,
                    onResult: function(deadLinks) {
                        if (deadLinks.length === 0) {
                            showToast('✅ 检查完成！所有链接都正常');
                        } else {
                            showToast(`🔍 检查完成，发现 ${deadLinks.length} 个可能失效的链接，请手动确认`);
                        }
                    }
                });
            }
}

        // --- 分享功能 ---
        function shareUrl(title, url) {
            if (window.utils && window.utils.shareUrl) {
                window.utils.shareUrl(title, url, showToast);
            }
        }

        // --- 全文搜索 ---
        let hasLocalResults = false; // 标记是否有站内结果
        
        function doSearch() {
            const engine = document.getElementById('searchEngine').value;
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            
            // 如果已经有站内结果，再次搜索则使用外部引擎
            if (hasLocalResults && currentCategory === '搜索结果') {
                openExternalSearch(engine, keyword);
                return;
            }
            
            // 先尝试站内搜索
            const localResults = navData.filter(item => 
                item.title.toLowerCase().includes(keyword.toLowerCase()) ||
                item.desc.toLowerCase().includes(keyword.toLowerCase()) ||
                item.url.toLowerCase().includes(keyword.toLowerCase())
            );
            
            if (localResults.length > 0) {
                // 显示搜索结果
                hasLocalResults = true;
                showSearchResults(localResults, keyword);
                showToast(`找到 ${localResults.length} 个相关结果，再次点击搜索将使用外部搜索引擎`);
                return;
            }
            
            // 如果没有本地结果,使用外部搜索引擎
            hasLocalResults = false;
            openExternalSearch(engine, keyword);
        }
        
        // 打开外部搜索引擎
        function openExternalSearch(engine, keyword) {
            let url = '';
            if(engine === 'baidu') url = `https://www.baidu.com/s?wd=${encodeURIComponent(keyword)}`;
            if(engine === 'google') url = `https://www.google.com/search?q=${encodeURIComponent(keyword)}`;
            if(engine === 'bing') url = `https://www.bing.com/search?q=${encodeURIComponent(keyword)}`;
            if(engine === 'sogou') url = `https://www.sogou.com/web?query=${encodeURIComponent(keyword)}`;
            if(engine === 'github') url = `https://github.com/search?q=${encodeURIComponent(keyword)}&type=repositories`;
            if(engine === 'bilibili') url = `https://search.bilibili.com/all?keyword=${encodeURIComponent(keyword)}`;
            if(engine === 'weibo') url = `https://s.weibo.com/weibo/${encodeURIComponent(keyword)}`;
            if(engine === 'zhihu') url = `https://www.zhihu.com/search?q=${encodeURIComponent(keyword)}&type=content`;
            window.open(url, '_blank');
        }

        function showSearchResults(results, keyword) {
            const grid = document.getElementById('cardGrid');
            currentCategory = '搜索结果';
            
            grid.innerHTML = results.map((item, index) => `
                <div class="card" data-id="${item.id}" data-index="${index}">
                    <a href="${item.url}" target="_blank" style="text-decoration:none; color:inherit;">
                        <div class="card-header">
                            <div class="card-icon" id="icon-search-${item.id}">
                                ${renderIcon(item)}
                            </div>
                            <div class="card-title">${highlightText(item.title, keyword)}</div>
                        </div>
                        <div class="card-desc">${highlightText(item.desc, keyword)}</div>
                    </a>
                </div>
            `).join('');
            initLazyIcons();
            
            // 更新侧边栏选中状态
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            showToast(`找到 ${results.length} 个相关结果`);
        }

        function highlightText(text, keyword) {
            if (!keyword) return text;
            const regex = new RegExp(`(${keyword})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        // --- 移动端滑动手势 ---
        function initSwipeGesture() {
            let touchStartX = 0;
            let touchEndX = 0;
            const minSwipeDistance = 50;
            
            document.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            
            document.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
            
            function handleSwipe() {
                const distance = touchEndX - touchStartX;
                if (Math.abs(distance) < minSwipeDistance) return;
                
                const categories = ['全部', ...new Set(navData.map(item => item.category))];
                const currentIndex = categories.indexOf(currentCategory);
                
                if (distance > 0 && currentIndex > 0) {
                    // 右滑 - 上一个分类
                    switchCategory(categories[currentIndex - 1]);
                } else if (distance < 0 && currentIndex < categories.length - 1) {
                    // 左滑 - 下一个分类
                    switchCategory(categories[currentIndex + 1]);
                }
            }
        }

        // --- 刷新图标 ---
        function refreshFavicons() {
            // 在编辑模式下，刷新前先保存编辑内容
            if (isEditMode) saveInputChanges();
            
            faviconCache.clear();
            renderCards();
            showToast('图标缓存已清除，页面将重新加载图标');
        }

        // --- 返回顶部 ---
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // --- 导出数据 ---
        function exportData() {
            if (window.utils && window.utils.exportData) {
                window.utils.exportData(navData, showToast);
            }
        }

        // --- 导入数据 ---
        function importData(event) {
            if (window.utils && window.utils.importData) {
                // 在编辑模式下，导入前先保存当前编辑内容
                if (isEditMode) {
                    saveInputChanges();
                }
                
                window.utils.importData(event, {
                    showToast: showToast,
                    onSuccess: function(validatedData) {
                        navData = validatedData;
                        nextId = Math.max(...navData.map(item => item.id)) + 1;
                        currentCategory = '全部';
                        renderSidebar();
                        renderCards();
                        renderRecentVisits();
                        showToast('✅ 数据导入成功，请点击“💾 保存修改”按钮保存到服务器');
                    }
                });
            }
        }

        // --- 设置浏览器主页 ---
        function setAsHomepage() {
            const url = window.location.href;
                    
            // 尝试 IE 浏览器的方法(旧版)
            if (document.all) {
                try {
                    document.body.style.behavior = 'url(#default#homepage)';
                    document.body.setHomePage(url);
                    showToast('✅ 已设置为浏览器主页');
                    return;
                } catch (e) {
                    // 如果失败,继续显示说明
                }
            }
                    
            // 现代浏览器:使用 confirm 确认框
            const confirmed = confirm(
                `🏠 设置为浏览器主页\n\n` +
                `由于浏览器安全限制,需要您手动确认:\n\n` +
                `点击"确定"后,将自动复制网址到剪贴板,\n` +
                `请按照提示完成设置。\n\n` +
                `当前网址:\n${url}`
            );
                    
            if (confirmed) {
                // 复制到剪贴板
                navigator.clipboard.writeText(url).then(() => {
                    showHomepageInstructions(url);
                }).catch(() => {
                    // 如果复制失败,直接显示说明
                    showHomepageInstructions(url);
                });
            }
        }
                
        function showHomepageInstructions(url) {
            const message = `📌 请按以下步骤设置主页:\n\n` +
                           `1️⃣ 网址已复制到剪贴板\n\n` +
                           `2️⃣ 打开浏览器设置\n\n` +
                           `3️⃣ 找到"启动时"或"主页"设置\n\n` +
                           `4️⃣ 粘贴网址并保存\n\n` +
                           `💡 Chrome/Edge: 设置 > 启动时 > 打开特定页面\n` +
                           `💡 Firefox: 设置 > 主页 > 自定义网址`;
                    
            alert(message);
        }

        // --- 记录访问 ---
        function recordVisit(id) {
            // 更新最近访问
            const now = Date.now();
            recentVisits = recentVisits.filter(v => v.id !== id); // 移除旧记录
            recentVisits.unshift({ id, time: now }); // 添加到开头
            recentVisits = recentVisits.slice(0, 9); // 只保留最近9个
            localStorage.setItem('recentVisits', JSON.stringify(recentVisits));
            
            // 更新显示
            renderRecentVisits();
        }

        // --- 渲染最近访问 ---
        function renderRecentVisits() {
            // 如果配置为不显示，直接隐藏
            if (!SHOW_RECENT_VISITS) {
                const container = document.getElementById('recentVisits');
                if (container) {
                    container.style.display = 'none';
                }
                return;
            }
            
            const container = document.getElementById('recentVisits');
            const list = document.getElementById('recentList');
            
            if (recentVisits.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            
            list.innerHTML = recentVisits.map(visit => {
                const item = navData.find(i => i.id === visit.id);
                if (!item) return '';
                
                return `
                    <li class="recent-item" onclick="recordVisit(${item.id}); window.open('${item.url}', '_blank');" title="${item.title}">
                        <div class="recent-icon">
                            ${renderIcon(item, true)}
                        </div>
                    </li>
                `;
            }).join('');
        }

        // 启动
        init();
    </script>
</body>
